# Gradle JVM heap — sized for a 7-8 GB development machine. The Flutter
# default of -Xmx8G assumes 16+ GB of RAM and crashes the daemon on
# smaller hosts (the OS can't actually allocate 8 GB of contiguous
# virtual memory once Windows + browsers + Studio are loaded). 2 GB is
# enough for `flutter build apk` on this codebase. Bump to 3-4 GB if
# you move to a beefier machine.
org.gradle.jvmargs=-Xmx2G -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true
